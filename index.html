<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Meeting Minutes Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { text-align: center; max-width: 800px; width: 90%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; margin: 10px; border: none; border-radius: 5px; font-weight: bold; }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; }
        #status { font-weight: bold; margin: 20px; padding: 10px; border-radius: 5px; background: #ecf0f1; }
        .result-box { text-align: left; margin-top: 30px; }
        .transcription-area { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #3498db; margin-bottom: 25px; }
        .memo-area { background: #e8f5e9; padding: 20px; border-radius: 8px; border-left: 5px solid #4caf50; white-space: pre-wrap; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Meeting Minutes AI</h1>
        <div class="controls">
            <button id="startBtn">Start Recording</button>
            <button id="stopBtn" disabled>Stop Recording</button>
        </div>
        <p id="status">Status: Idle</p>
        <audio id="audioPlayback" controls style="width: 100%; max-width: 400px;"></audio>
        <div id="output" class="result-box"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let mediaRecorder;
            let audioChunks = [];

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const status = document.getElementById('status');
            const outputDiv = document.getElementById('output');
            const audioPlayback = document.getElementById('audioPlayback');

            startBtn.onclick = async () => {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
    // 1. Audio Playback Fix: Pehle audio setup karein taaki server error se pehle aap sun sakein
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const audioUrl = URL.createObjectURL(audioBlob);
    audioPlayback.src = audioUrl;
    audioPlayback.load(); // Playback ko force load karein

    status.innerText = "Status: Sending to Server...";
    status.style.color = "#d35400";

    const formData = new FormData();
    formData.append('audio_data', audioBlob, 'recording.webm');

    try {
        const response = await fetch('http://localhost:5000/upload', {
            method: 'POST',
            body: formData
        });
        console.log("Response status:", response.status);

        // 2. Response Check: Agar server 200 de raha hai
        if (!response.ok) throw new Error("Server error: " + response.status);

        const result = await response.json();
        console.log("Final Result:", result);
        outputDiv.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

        // 3. UI Update: Agar elements mil gaye hain
        if (outputDiv) {
            outputDiv.innerHTML = `
                <div class="transcription-area" style="padding:15px; border-left:5px solid #3498db; background:#f9f9f9; margin-top:20px;">
                    <h3 style="margin:0">🎤 Transcription:</h3>
                    <p>${result.transcription || 'No text found'}</p>
                </div>
                <div class="memo-area" style="padding:15px; border-left:5px solid #4caf50; background:#e8f5e9; margin-top:15px;">
                    <h3 style="margin:0">📝 AI Memo:</h3>
                    <div style="white-space: pre-wrap;">${(result.memo || 'No memo').replace(/\n/g, '<br>')}</div>
                </div>
            `;
            status.innerText = "Status: Processed Successfully! ✅";
            status.style.color = "#27ae60";
        }
    } catch (error) {
        console.error("Critical Error:", error);
        status.innerText = "Status: Error - " + error.message;
        status.style.color = "#c0392b";
    }
};

                mediaRecorder.start();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerText = "Status: Recording... 🔴";
            };

            stopBtn.onclick = () => {
                mediaRecorder.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };
        });
    </script>
</body>
</html>
